# Publish tower-package-wasm to npm.
#
# Assumed to run as a subworkflow of .github/workflows/release.yml; specifically, as a publish job
# within `cargo-dist`, in parallel with publish-pypi.yml.
#
# Authentication uses npm's OIDC Trusted Publishing — no NPM_TOKEN
# secret. The `tower-package-wasm` package must have a trusted publisher
# configured on npmjs.com that matches this repo, this workflow file,
# and the `release` environment below.
name: "[tower] Publish to npm"

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

jobs:
  npm-publish:
    name: Upload to npm
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1.11.0
        with:
          target: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      - name: Build wasm package
        working-directory: crates/tower-package
        run: ./scripts/build.sh bundler

      - name: Publish to npm
        working-directory: crates/tower-package/pkg
        run: npm publish --access public --provenance
