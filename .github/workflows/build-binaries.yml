# Build tower on all platforms.
#
# Generates both wheels (for PyPI) and archived binaries (for GitHub releases).
#
# Assumed to run as a subworkflow of .github/workflows/release.yml; specifically, as a local
# artifacts job within `cargo-dist`.
#
# Shamelessly lifted from the guys who brought Ruff to the world.
# https://github.com/astral-sh/ruff/
name: "[tower] Build binaries"

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - '**.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PACKAGE_NAME: tower
  MODULE_NAME: tower
  EXECUTABLE_NAME: tower
  PYTHON_VERSION: "3.13"
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUSTUP_MAX_RETRIES: 10

jobs:
  sdist:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions-rust-lang/setup-rust-toolchain@v1.11.0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: "Build sdist"
        uses: PyO3/maturin-action@v1.50.1
        with:
          command: sdist
          args: --out dist
      - name: "Test sdist"
        run: |
          pip install dist/${{ env.PACKAGE_NAME }}-*.tar.gz --force-reinstall
          ${{ env.EXECUTABLE_NAME }} --help
          python -m ${{ env.MODULE_NAME }} --help
      - name: "Upload sdist"
        uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: dist

  macos-x86_64:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    runs-on: macos-15
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: "Install fresh upstream rustup"
        # The macos-15-arm64 runner image (20260511.0048+) ships a broken
        # Homebrew rustup whose bundled rustup-init rejects standard argv
        # forwarded from the rustup proxy, breaking `rustup component add`
        # and other commands maturin-action invokes. Upstream:
        # https://github.com/actions/runner-images/issues/14097
        # Scrub Homebrew's rustup AND any stale upstream rustup, then
        # reinstall cleanly with 1.88 as the default so setup-rust-toolchain
        # has nothing left to do but verify.
        run: |
          brew uninstall --ignore-dependencies rustup || true
          rm -f "$HOME/.cargo/bin/rustup" "$HOME/.cargo/bin/rustup-init"
          curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused -fsSL https://sh.rustup.rs | sh -s -- --default-toolchain 1.88 --profile minimal -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: actions-rust-lang/setup-rust-toolchain@v1.11.0
        with:
          # Don't restore ~/.cargo/bin from cache — it'd clobber the
          # freshly-installed upstream rustup with a stale (and possibly
          # Homebrew-linked) binary from a previous run.
          cache-bin: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      - name: "Build wheels - x86_64"
        uses: PyO3/maturin-action@v1.50.1
        with:
          target: x86_64
          args: --release --locked --out dist -i python${{ matrix.python-version }}
      - name: "Upload wheels"
        uses: actions/upload-artifact@v6
        with:
          name: wheels-macos-x86_64-py${{ matrix.python-version }}
          path: dist

  macos-aarch64:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    runs-on: macos-15
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: "Install fresh upstream rustup"
        # The macos-15-arm64 runner image (20260511.0048+) ships a broken
        # Homebrew rustup whose bundled rustup-init rejects standard argv
        # forwarded from the rustup proxy, breaking `rustup component add`
        # and other commands maturin-action invokes. Upstream:
        # https://github.com/actions/runner-images/issues/14097
        # Scrub Homebrew's rustup AND any stale upstream rustup, then
        # reinstall cleanly with 1.88 as the default so setup-rust-toolchain
        # has nothing left to do but verify.
        run: |
          brew uninstall --ignore-dependencies rustup || true
          rm -f "$HOME/.cargo/bin/rustup" "$HOME/.cargo/bin/rustup-init"
          curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused -fsSL https://sh.rustup.rs | sh -s -- --default-toolchain 1.88 --profile minimal -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: actions-rust-lang/setup-rust-toolchain@v1.11.0
        with:
          # Don't restore ~/.cargo/bin from cache — it'd clobber the
          # freshly-installed upstream rustup with a stale (and possibly
          # Homebrew-linked) binary from a previous run.
          cache-bin: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: arm64
      - name: "Build wheels - aarch64"
        uses: PyO3/maturin-action@v1.50.1
        with:
          target: aarch64
          args: --release --locked --out dist -i python${{ matrix.python-version }}
      - name: "Test wheel - aarch64"
        run: |
          pip install dist/*.whl --force-reinstall
          ${{ env.EXECUTABLE_NAME }} --help
          python -m ${{ env.MODULE_NAME }} --help
      - name: "Upload wheels"
        uses: actions/upload-artifact@v6
        with:
          name: wheels-aarch64-apple-darwin-py${{ matrix.python-version }}
          path: dist

  windows:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    runs-on: windows-latest
    strategy:
      matrix:
        platform:
          - target: x86_64-pc-windows-msvc
            arch: x64
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions-rust-lang/setup-rust-toolchain@v1.11.0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.platform.arch }}
      - name: "Build wheels"
        uses: PyO3/maturin-action@v1.50.1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --locked --out dist -i python${{ matrix.python-version }}
      - name: "Test wheel"
        shell: bash
        run: |
          python -m pip install dist/*.whl --force-reinstall
          ${{ env.EXECUTABLE_NAME }} --help
          python -m ${{ env.MODULE_NAME }} --help
      - name: "Upload wheels"
        uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.platform.target }}-py${{ matrix.python-version }}
          path: dist

  linux:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions-rust-lang/setup-rust-toolchain@v1.11.0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      - name: "Build wheels"
        uses: PyO3/maturin-action@v1.50.1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release --locked --out dist -i python${{ matrix.python-version }}
          before-script-linux: |
            # If we're running on rhel centos, install needed packages.
            if command -v yum &> /dev/null; then
                yum update -y && yum install -y perl-core openssl openssl-devel pkgconfig libatomic
            else
                # If we're running on debian-based system.
                sudo apt update -y
                sudo apt-get install -y libssl-dev openssl pkg-config
            fi
      - name: "Test wheel"
        if: ${{ startsWith(matrix.target, 'x86_64') }}
        run: |
          PYTAG="cp$(python -c "import sys; print(f'{sys.version_info.major}{sys.version_info.minor}')")"
          pip install dist/*-${PYTAG}-*.whl --force-reinstall
          ${{ env.EXECUTABLE_NAME }} --help
          python -m ${{ env.MODULE_NAME }} --help
      - name: "Upload wheels"
        uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.target }}
          path: dist

  linux-cross:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - target: aarch64-unknown-linux-gnu
            arch: aarch64
            # see https://github.com/astral-sh/ruff/issues/3791
            # and https://github.com/gnzlbg/jemallocator/issues/170#issuecomment-1503228963
            maturin_docker_options: -e JEMALLOC_SYS_WITH_LG_PAGE=16 -e PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1.50.1
        with:
          target: ${{ matrix.platform.target }}
          manylinux: 2_28
          docker-options: ${{ matrix.platform.maturin_docker_options }}
          args: --release --locked --out dist -i ${{ format('python{0}', matrix.python-version) }}
        env:
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
      - uses: uraimo/run-on-arch-action@v3
        if: ${{ matrix.platform.arch != 'ppc64' && matrix.platform.arch != 'ppc64le'}}
        name: Test wheel
        with:
          arch: ${{ matrix.platform.arch }}
          distro: ubuntu24.04
          githubToken: ${{ github.token }}
          install: |
            apt-get update
            apt-get install -y software-properties-common
            add-apt-repository ppa:deadsnakes/ppa
            apt-get update
            apt-get install -y --no-install-recommends ${{ format('python{0}-full', matrix.python-version) }} ${{ format('python{0}-venv', matrix.python-version) }} cargo libffi-dev
          # Create and use a virtual environment to avoid the externally-managed-environment error
          run: |
            ln -s -f /usr/bin/${{ format('python{0}', matrix.python-version) }} /usr/bin/python3
            ln -s -f /usr/bin/${{ format('pip{0}', matrix.python-version) }} /usr/bin/pip3
            # Workaround for QEMU bug when emulating 32-bit on 64-bit hosts
            # See: https://github.com/docker/buildx/issues/395
            # Use /tmp for CARGO_HOME (often tmpfs, which avoids the QEMU filesystem bug)
            export CARGO_HOME=/tmp/cargo-home
            python3 -m venv /tmp/venv
            . /tmp/venv/bin/activate
            pip3 install dist/*.whl --force-reinstall
            ${{ env.EXECUTABLE_NAME }} --help
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.platform.target }}-py${{ matrix.python-version }}
          path: dist

  musllinux:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: "Install OpenSSL"
        run: sudo apt-get update && sudo apt-get install libssl-dev openssl
      - name: "Build wheels"
        uses: PyO3/maturin-action@v1.50.1
        with:
          target: ${{ matrix.target }}
          manylinux: musllinux_1_2
          args: --release --locked --out dist -i python${{ matrix.python-version }}
      - name: "Test wheel"
        if: matrix.target == 'x86_64-unknown-linux-musl'
        uses: addnab/docker-run-action@v3
        with:
          image: python:${{ matrix.python-version}}-alpine
          options: -v ${{ github.workspace }}:/io -w /io
          run: |
            apk add rust
            python -m venv .venv
            .venv/bin/pip3 install dist/*.whl --force-reinstall
            .venv/bin/${{ env.EXECUTABLE_NAME }} --help
      - name: "Upload wheels"
        uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.target }}
          path: dist

  musllinux-cross:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - target: aarch64-unknown-linux-musl
            arch: aarch64
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: "Build wheels"
        uses: PyO3/maturin-action@v1.50.1
        with:
          target: ${{ matrix.platform.target }}
          manylinux: musllinux_1_2
          args: --release --locked --out dist -i python3.12 python3.13 python3.14
      - uses: uraimo/run-on-arch-action@v2
        name: Test wheel
        with:
          arch: ${{ matrix.platform.arch }}
          distro: alpine_latest
          githubToken: ${{ github.token }}
          install: |
            apk add python3 python3-dev py3-pip rust
          run: |
            python -m venv .venv
            PYTAG="cp$(python3 -c "import sys; print(f'{sys.version_info.major}{sys.version_info.minor}')")"
            .venv/bin/pip3 install dist/*-${PYTAG}-*.whl --force-reinstall
            .venv/bin/${{ env.EXECUTABLE_NAME }} --help
      - name: "Upload wheels"
        uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.platform.target }}
          path: dist
